<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOMENT · מפת ההובלה האישית</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /*
        גופן המותג: Fb Typograph / טיפוגרף (Fontbit, גופן מסחרי בליצנזיה).
        לאחר קבלת קבצי הגופן (woff2/woff/ttf), בטלו את ההערה ל-@font-face למטה.
        Assistant משמש כתחליף חופשי קרוב בינתיים.

      @font-face {
        font-family: "Fb Typograph";
        src: url("fonts/FbTypograph-Light.woff2") format("woff2");
        font-weight: 300;
        font-display: swap;
      }
      @font-face {
        font-family: "Fb Typograph";
        src: url("fonts/FbTypograph-Regular.woff2") format("woff2");
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: "Fb Typograph";
        src: url("fonts/FbTypograph-Bold.woff2") format("woff2");
        font-weight: 600;
        font-display: swap;
      }
      @font-face {
        font-family: "Fb Typograph";
        src: url("fonts/FbTypograph-Black.woff2") format("woff2");
        font-weight: 800;
        font-display: swap;
      }
      */

      /* ── Color palette ──────────────────────────────────────── */
      :root {
        --bg: #edf2ff;
        --bg-grad-start: #dce8ff;
        --bg-grad-end: #f0f4ff;
        --ink: #0a0a1e;
        --blue: #1565d8;
        --blue-bright: #2178f5;
        --blue-navy: #0000b0;
        --blue-soft: rgba(21, 101, 216, 0.14);
        --blue-glow: rgba(33, 120, 245, 0.32);
        --surface: #ffffff;
        --border: #c8d9f7;
        --muted: #4a5a80;
        --muted-2: #7a8aaa;
        --radius: 20px;
        --shadow: 0 2px 4px rgba(10, 10, 60, 0.05),
          0 16px 48px -18px rgba(21, 101, 216, 0.18);
        --shadow-blue: 0 8px 30px -8px rgba(21, 101, 216, 0.45);
        --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
        --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
        --font-main: "Fb Typograph", "Assistant", "Heebo", system-ui, sans-serif;
      }

      /* ── Reset ───────────────────────────────────────────────── */
      * { box-sizing: border-box; }
      html, body { margin: 0; padding: 0; }

      /* ── Background animated gradient ───────────────────────── */
      body {
        background: linear-gradient(135deg, var(--bg-grad-start) 0%, var(--bg-grad-end) 50%, #e4edff 100%);
        background-size: 400% 400%;
        animation: bgShift 12s ease infinite;
        color: var(--ink);
        font-family: var(--font-main);
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
        min-height: 100vh;
      }

      @keyframes bgShift {
        0%   { background-position: 0% 50%; }
        50%  { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
      }

      /* ── Floating orbs (background decoration) ───────────────── */
      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        filter: blur(80px);
        opacity: 0.22;
      }
      body::before {
        width: 520px; height: 520px;
        background: radial-gradient(circle, #2178f5, transparent 70%);
        top: -120px; right: -120px;
        animation: orbFloat1 18s ease-in-out infinite;
      }
      body::after {
        width: 420px; height: 420px;
        background: radial-gradient(circle, #0000b0, transparent 70%);
        bottom: -80px; left: -80px;
        animation: orbFloat2 22s ease-in-out infinite;
      }

      @keyframes orbFloat1 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50%       { transform: translate(40px, 60px) scale(1.1); }
      }
      @keyframes orbFloat2 {
        0%, 100% { transform: translate(0, 0) scale(1); }
        50%       { transform: translate(-30px, -50px) scale(1.08); }
      }

      #root {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: clamp(0px, 4vw, 40px);
        position: relative;
        z-index: 1;
      }

      .app {
        width: 100%;
        max-width: 560px;
        margin: auto;
      }

      /* ── Screen card ─────────────────────────────────────────── */
      .screen {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: clamp(24px, 6vw, 40px);
        animation: screenIn 0.55s var(--ease) both;
        position: relative;
        overflow: hidden;
      }
      /* Top accent line */
      .screen::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 4px;
        background: linear-gradient(90deg, var(--blue-navy), var(--blue-bright), var(--blue-navy));
        background-size: 200% 100%;
        animation: shimmerBar 3s linear infinite;
        border-radius: var(--radius) var(--radius) 0 0;
      }
      @keyframes shimmerBar {
        0%   { background-position: 200% 0; }
        100% { background-position: -200% 0; }
      }

      @keyframes screenIn {
        from {
          opacity: 0;
          transform: translateY(28px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }

      .map-screen {
        background: transparent;
        border: none;
        box-shadow: none;
        padding: 0;
        animation: screenIn 0.55s var(--ease) both;
      }
      .map-screen::before { display: none; }

      /* ── Buttons ─────────────────────────────────────────────── */
      .btn {
        font-family: inherit;
        font-size: 17px;
        font-weight: 600;
        border-radius: 14px;
        padding: 14px 26px;
        min-height: 52px;
        border: 1.5px solid transparent;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition: transform 0.15s var(--ease-spring),
          background 0.2s, box-shadow 0.2s, border-color 0.2s, color 0.2s;
      }
      .btn::after {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at center, rgba(255,255,255,0.35) 0%, transparent 70%);
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }
      .btn:hover::after { opacity: 1; }
      .btn:active {
        transform: translateY(2px) scale(0.975);
      }
      .btn:disabled { opacity: 0.5; cursor: default; }
      .btn:disabled::after { display: none; }

      .btn-primary {
        background: linear-gradient(135deg, var(--blue-bright) 0%, var(--blue-navy) 100%);
        color: #fff;
        box-shadow: 0 4px 16px -4px var(--blue-glow);
      }
      .btn-primary:hover:not(:disabled) {
        box-shadow: var(--shadow-blue);
        transform: translateY(-2px) scale(1.01);
      }
      .btn-outline {
        background: #fff;
        border-color: var(--blue);
        color: var(--blue);
      }
      .btn-outline:hover:not(:disabled) {
        background: #f0f5ff;
        border-color: var(--blue-bright);
        box-shadow: 0 4px 16px -4px var(--blue-soft);
      }
      .btn-ghost {
        background: transparent;
        color: var(--muted);
      }
      .btn-ghost:hover:not(:disabled) {
        color: var(--ink);
        background: rgba(21, 101, 216, 0.06);
      }
      .btn-block { display: block; width: 100%; }

      /* ── Inputs ──────────────────────────────────────────────── */
      .field { display: block; margin: 28px 0 20px; }
      .field-label {
        display: block;
        font-size: 15px;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .text-input {
        width: 100%;
        font-family: inherit;
        font-size: 17px;
        color: var(--ink);
        background: #f8faff;
        border: 1.5px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
        transition: border-color 0.2s, box-shadow 0.2s, background 0.2s, transform 0.15s;
      }
      .text-input::placeholder { color: var(--muted-2); }
      .text-input:focus {
        outline: none;
        background: #fff;
        border-color: var(--blue-bright);
        box-shadow: 0 0 0 4px var(--blue-soft);
        transform: scale(1.005);
      }
      .textarea { resize: vertical; min-height: 96px; line-height: 1.5; }
      .other-input { margin-top: 6px; }

      /* ── Opening screen ──────────────────────────────────────── */
      .op-eyebrow {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.05em;
        color: var(--blue);
        margin-bottom: 14px;
        animation: fadeSlideDown 0.5s var(--ease) 0.1s both;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .op-eyebrow::before {
        content: "";
        display: inline-block;
        width: 24px; height: 3px;
        background: linear-gradient(90deg, var(--blue-navy), var(--blue-bright));
        border-radius: 2px;
        flex: none;
      }

      .op-title {
        font-size: clamp(24px, 6.5vw, 30px);
        font-weight: 800;
        line-height: 1.25;
        margin: 0 0 14px;
        text-wrap: balance;
        animation: fadeSlideDown 0.5s var(--ease) 0.18s both;
      }
      .op-framing {
        font-size: 17px;
        color: var(--muted);
        margin: 0 0 26px;
        text-wrap: pretty;
        animation: fadeSlideDown 0.5s var(--ease) 0.26s both;
      }

      .op-spine {
        display: flex;
        direction: ltr;
        gap: clamp(6px, 2.5vw, 14px);
        justify-content: center;
        padding: 22px 0 6px;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
        animation: fadeSlideDown 0.5s var(--ease) 0.34s both;
      }
      .op-letter {
        font-size: clamp(22px, 7vw, 34px);
        font-weight: 800;
        color: var(--border);
        line-height: 1;
        animation: letterWave 3.2s cubic-bezier(0.45, 0, 0.55, 1) infinite;
      }
      .op-letter:nth-child(1) { animation-delay: 0s;    color: #b8ccee; }
      .op-letter:nth-child(2) { animation-delay: 0.22s; color: #c4d4f0; }
      .op-letter:nth-child(3) { animation-delay: 0.44s; color: #b8ccee; }
      .op-letter:nth-child(4) { animation-delay: 0.66s; color: #c4d4f0; }
      .op-letter:nth-child(5) { animation-delay: 0.88s; color: #b8ccee; }
      .op-letter:nth-child(6) { animation-delay: 1.10s; color: #c4d4f0; }

      @keyframes letterWave {
        0%        { transform: translateY(0)    scale(1);    color: #b8ccee; }
        30%       { transform: translateY(-7px) scale(1.08); color: var(--blue-bright); }
        60%       { transform: translateY(-2px) scale(1.02); color: var(--blue); }
        100%      { transform: translateY(0)    scale(1);    color: #b8ccee; }
      }

      .op-hint {
        font-size: 13px;
        color: var(--muted-2);
        text-align: center;
        margin-top: 14px;
        animation: fadeSlideDown 0.5s var(--ease) 0.6s both;
      }
      .op-hint.subtle { text-align: right; margin: 14px 0 0; }

      /* Logo bar on opening */
      .op-logos {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 22px;
        padding-bottom: 18px;
        border-bottom: 1px solid var(--border);
        animation: fadeSlideDown 0.5s var(--ease) 0.05s both;
      }
      .op-logos .logo-ngg   { height: 44px; width: auto; }

      /* ── Animation helpers ───────────────────────────────────── */
      @keyframes fadeSlideDown {
        from { opacity: 0; transform: translateY(-12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeSlideUp {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes popIn {
        from { opacity: 0; transform: scale(0.7); }
        to   { opacity: 1; transform: scale(1); }
      }
      @keyframes rippleOut {
        0%   { box-shadow: 0 0 0 0 var(--blue-glow); }
        100% { box-shadow: 0 0 0 14px transparent; }
      }

      /* ── Spine (progress) ────────────────────────────────────── */
      .spine {
        display: flex;
        direction: ltr;
        gap: 10px;
        justify-content: space-between;
        margin-bottom: 30px;
      }
      .spine-dot {
        flex: 1;
        aspect-ratio: 1;
        max-width: 52px;
        border-radius: 50%;
        border: 1.5px solid var(--border);
        background: #fff;
        color: var(--muted-2);
        font-family: inherit;
        cursor: pointer;
        display: grid;
        place-items: center;
        padding: 0;
        transition: all 0.35s var(--ease-spring);
        animation: popIn 0.4s var(--ease-spring) both;
      }
      .spine-dot:nth-child(1) { animation-delay: 0.05s; }
      .spine-dot:nth-child(2) { animation-delay: 0.10s; }
      .spine-dot:nth-child(3) { animation-delay: 0.15s; }
      .spine-dot:nth-child(4) { animation-delay: 0.20s; }
      .spine-dot:nth-child(5) { animation-delay: 0.25s; }
      .spine-dot:nth-child(6) { animation-delay: 0.30s; }
      .spine-dot:hover {
        transform: scale(1.12);
        border-color: var(--blue);
      }
      .spine-letter {
        font-size: 18px;
        font-weight: 800;
        line-height: 1;
      }
      .spine-dot.filled {
        background: linear-gradient(135deg, var(--blue-bright), var(--blue-navy));
        border-color: var(--blue);
        color: #fff;
        box-shadow: 0 4px 14px -4px var(--blue-glow);
        animation: rippleOut 0.6s var(--ease) forwards, popIn 0.4s var(--ease-spring) both;
      }
      .spine-dot.current {
        border-color: var(--blue-bright);
        color: var(--blue);
        transform: scale(1.12);
        box-shadow: 0 0 0 4px var(--blue-soft);
      }
      .spine-dot.current.filled {
        color: #fff;
        transform: scale(1.12);
      }

      /* ── Step screen ─────────────────────────────────────────── */
      .step-head {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 18px;
      }
      .step-letter {
        font-size: clamp(48px, 16vw, 68px);
        font-weight: 800;
        background: linear-gradient(135deg, var(--blue-bright), var(--blue-navy));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 0.85;
        animation: letterPulse 3s ease-in-out infinite;
        display: inline-block;
      }
      @keyframes letterPulse {
        0%, 100% { filter: drop-shadow(0 0 0 transparent); }
        50%       { filter: drop-shadow(0 4px 12px rgba(33,120,245,0.4)); }
      }
      .step-titles { display: flex; flex-direction: column; gap: 2px; }
      .step-name { font-size: 20px; font-weight: 600; }
      .step-count {
        font-size: 13px;
        color: var(--muted-2);
        font-weight: 600;
        letter-spacing: 0.05em;
        direction: ltr;
        text-align: right;
      }
      .step-question {
        font-size: clamp(19px, 4.8vw, 22px);
        font-weight: 400;
        line-height: 1.4;
        margin: 0 0 22px;
        text-wrap: pretty;
        animation: fadeSlideDown 0.4s var(--ease) 0.1s both;
      }

      /* ── Choices ─────────────────────────────────────────────── */
      .choices { display: flex; flex-direction: column; gap: 10px; }
      .choice {
        display: flex;
        align-items: center;
        gap: 14px;
        text-align: right;
        font-family: inherit;
        font-size: 17px;
        color: var(--ink);
        background: #f8faff;
        border: 1.5px solid var(--border);
        border-radius: 14px;
        padding: 0 18px;
        min-height: 56px;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.15s var(--ease-spring);
        animation: fadeSlideUp 0.3s var(--ease) both;
      }
      .choice:nth-child(1) { animation-delay: 0.05s; }
      .choice:nth-child(2) { animation-delay: 0.10s; }
      .choice:nth-child(3) { animation-delay: 0.15s; }
      .choice:nth-child(4) { animation-delay: 0.20s; }
      .choice:nth-child(5) { animation-delay: 0.25s; }
      .choice:nth-child(6) { animation-delay: 0.30s; }
      .choice:nth-child(7) { animation-delay: 0.35s; }
      .choice:hover {
        border-color: var(--blue);
        background: #eef4ff;
        transform: translateX(-3px);
      }
      .choice-mark {
        flex: none;
        width: 22px; height: 22px;
        border-radius: 50%;
        border: 2px solid var(--border);
        transition: all 0.2s var(--ease-spring);
        position: relative;
        background: #fff;
      }
      .choice.on {
        border-color: var(--blue-bright);
        background: #eef4ff;
        box-shadow: 0 0 0 3px var(--blue-soft);
        transform: translateX(-3px);
      }
      .choice.on .choice-mark {
        border-color: var(--blue-bright);
        background: linear-gradient(135deg, var(--blue-bright), var(--blue-navy));
        transform: scale(1.15);
      }
      .choice.on .choice-mark::after {
        content: "";
        position: absolute;
        inset: 0; margin: auto;
        width: 7px; height: 7px;
        border-radius: 50%;
        background: #fff;
      }
      .choice-text { flex: 1; }

      /* ── Nav bar ─────────────────────────────────────────────── */
      .nav-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-top: 28px;
        padding-top: 22px;
        border-top: 1px solid var(--border);
      }

      /* ── Map screen ──────────────────────────────────────────── */
      .map-stage { width: 100%; display: flex; justify-content: center; }
      .map-frame { position: relative; overflow: hidden; }
      .map-scaler {
        position: absolute;
        top: 0; left: 0;
        width: 794px;
        transform-origin: top left;
      }
      .export-bar {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 560px;
        margin: 22px auto 0;
        animation: fadeSlideUp 0.5s var(--ease) 0.3s both;
      }

      /* ── A4 Map ──────────────────────────────────────────────── */
      .a4 {
        width: 794px;
        height: 1123px;
        background: #fff;
        color: var(--ink);
        position: relative;
        box-shadow: 0 20px 60px -24px rgba(10, 10, 60, 0.3);
        animation: screenIn 0.6s var(--ease) both;
      }
      .a4::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 6px;
        background: linear-gradient(90deg, var(--blue-navy), var(--blue-bright), var(--blue-navy));
        z-index: 2;
      }
      .a4-inner {
        position: absolute;
        inset: 0;
        padding: 60px 64px 52px;
        display: flex;
        flex-direction: column;
      }

      .map-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 24px;
      }
      .map-title {
        font-size: 40px;
        font-weight: 800;
        background: linear-gradient(135deg, var(--blue-bright), var(--blue-navy));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin: 0 0 8px;
        line-height: 1;
        white-space: nowrap;
      }
      .map-meta { font-size: 16px; color: var(--muted); font-weight: 400; }
      .map-logos {
        display: flex;
        align-items: center;
        gap: 16px;
        flex: none;
      }
      .map-logos svg { display: block; }

      .map-rule {
        height: 3px;
        background: linear-gradient(90deg, var(--blue-navy), var(--blue-bright) 60%, transparent);
        margin: 26px 0 6px;
        border-radius: 2px;
      }
      .map-rule.soft {
        height: 1px;
        background: var(--border);
        margin: 0 0 22px;
      }

      .map-body {
        position: relative;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        padding: 18px 0;
      }
      .spine-line {
        position: absolute;
        top: 34px; bottom: 34px; right: 27px;
        width: 2px;
        background: linear-gradient(180deg, var(--blue-bright), var(--blue-navy));
        opacity: 0.7;
      }

      .milestone {
        display: flex;
        align-items: flex-start;
        gap: 22px;
        opacity: 0.45;
        transition: opacity 0.5s var(--ease);
      }
      .milestone.is-filled { opacity: 1; }
      .ms-node {
        flex: none;
        width: 56px; height: 56px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid var(--blue);
        color: var(--blue);
        display: grid;
        place-items: center;
        position: relative;
        z-index: 1;
        transition: all 0.5s var(--ease-spring);
      }
      .milestone.is-filled .ms-node {
        background: linear-gradient(135deg, var(--blue-bright), var(--blue-navy));
        color: #fff;
        border-color: var(--blue-bright);
        box-shadow: 0 0 0 4px rgba(21,101,216,0.2);
      }
      .ms-letter { font-size: 28px; font-weight: 800; line-height: 1; }
      .ms-content { padding-top: 4px; flex: 1; min-width: 0; }
      .ms-name {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: var(--blue);
        margin-bottom: 3px;
      }
      .ms-answer { font-size: 19px; line-height: 1.4; }
      .ms-label { font-weight: 600; color: var(--blue-navy); }
      .ms-value { font-weight: 400; color: var(--ink); }
      .ms-empty { color: var(--muted-2); }

      .map-foot { margin-top: 12px; }
      .map-closing {
        text-align: center;
        font-size: 22px;
        font-weight: 600;
        background: linear-gradient(90deg, var(--blue-navy), var(--blue-bright));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .map-closing::before,
      .map-closing::after {
        content: "·";
        color: var(--blue-bright);
        -webkit-text-fill-color: var(--blue-bright);
        margin: 0 12px;
        font-weight: 800;
      }

      /* Map logos bottom row */
      .map-foot-logos {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 14px;
      }

      /* ── Reset bar ───────────────────────────────────────────── */
      .reset-bar {
        display: flex;
        justify-content: center;
        margin-top: 14px;
        animation: fadeSlideUp 0.4s var(--ease) 0.5s both;
      }
      .reset-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 14px;
        padding: 8px 16px;
        min-height: unset;
        border-radius: 20px;
        color: var(--muted-2);
        border: 1px solid var(--border);
        transition: color 0.2s, border-color 0.2s, background 0.2s;
      }
      .reset-btn:hover { color: var(--blue); border-color: var(--blue); background: #f0f5ff; }
      .reset-confirm {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: var(--muted);
        background: #fff;
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 6px 14px;
        animation: popIn 0.2s var(--ease-spring) both;
        box-shadow: var(--shadow);
      }
      .reset-yes { color: #c0392b !important; font-size: 14px; padding: 6px 12px; min-height: unset; }
      .reset-no  { color: var(--muted) !important; font-size: 14px; padding: 6px 12px; min-height: unset; }

      @media (max-width: 420px) {
        .screen { border-radius: 14px; }
        .spine  { gap: 6px; }
      }

      /* ── Staggered field animation ───────────────────────────── */
      .field { animation: fadeSlideDown 0.4s var(--ease) 0.25s both; }
      .btn-block { animation: fadeSlideUp 0.4s var(--ease) both; }
    </style>

    <!-- ── MAP COMPONENT ─────────────────────────────────────────── -->
    <script type="text/babel">
      (function () {
        const C = window.MOMENT_CONTENT;

        function resolveAnswer(step, answers) {
          const v = answers[step.key];
          if (!v) return "";
          if (step.type === "text") return (v || "").trim();
          if (step.type === "multi") {
            const arr = v.selected || [];
            const parts = arr
              .map((o) => (o === "__other__" ? (v.other || "").trim() : o))
              .filter(Boolean);
            return parts.join("  ·  ");
          }
          if (v.selected) {
            return v.selected === "__other__"
              ? (v.other || "").trim()
              : v.selected;
          }
          return "";
        }
        window.resolveAnswer = resolveAnswer;

        function MomentMap({ answers, name, date }) {
          const meta = [C.brand.service, name && name.trim(), date]
            .filter(Boolean)
            .join("   ·   ");

          return (
            <div className="a4" id="moment-map" dir="rtl">
              <div className="a4-inner">
                <header className="map-head">
                  <div className="map-head-text">
                    <h1 className="map-title">{C.map.title}</h1>
                    <div className="map-meta">{meta}</div>
                  </div>
                  <div className="map-logos">
                    <window.NGGLogo height={46} />
                  </div>
                </header>

                <div className="map-rule" />

                <div className="map-body">
                  <div className="spine-line" />
                  {C.steps.map((step, i) => {
                    const ans = resolveAnswer(step, answers);
                    const filled = !!ans;
                    return (
                      <div
                        className={"milestone" + (filled ? " is-filled" : "")}
                        key={i}
                      >
                        <div className="ms-node">
                          <span className="ms-letter">{step.letter}</span>
                        </div>
                        <div className="ms-content">
                          <div className="ms-name">{step.name}</div>
                          <div className="ms-answer">
                            <span className="ms-label">{step.mapLabel}:</span>{" "}
                            {filled ? (
                              <span className="ms-value">{ans}</span>
                            ) : (
                              <span className="ms-empty">{C.map.emptyValue}</span>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                <footer className="map-foot">
                  <div className="map-rule soft" />
                  <div className="map-closing">{C.map.closing}</div>
                  <div className="map-foot-logos">
                    <window.NGGLogo height={30} />
                  </div>
                </footer>
              </div>
            </div>
          );
        }

        window.MomentMap = MomentMap;
      })();
    </script>

    <!-- ── SESSION ISOLATION: wipe any stale storage on every load ── -->
    <script>
      try { localStorage.clear(); sessionStorage.clear(); } catch(e) {}
    </script>

    <!-- ── APP ───────────────────────────────────────────────────── -->
    <script type="text/babel">
      (function () {
        const { useState, useRef, useEffect, useCallback } = React;
        const C = window.MOMENT_CONTENT;
        const OTHER = "__other__";

        function initAnswers() {
          const a = {};
          C.steps.forEach((s) => {
            if (s.type === "text") a[s.key] = "";
            else if (s.type === "multi") a[s.key] = { selected: [], other: "" };
            else a[s.key] = { selected: "", other: "" };
          });
          return a;
        }

        function isAnswered(step, v) {
          if (!v) return false;
          if (step.type === "text") return !!v.trim();
          if (step.type === "multi")
            return (
              v.selected.length > 0 &&
              !(v.selected.length === 1 && v.selected[0] === OTHER && !v.other.trim())
            );
          return v.selected && !(v.selected === OTHER && !v.other.trim());
        }

        function Spine({ answers, current, onJump }) {
          return (
            <div className="spine" role="list" aria-label="התקדמות במפה">
              {C.steps.map((s, i) => {
                const filled = isAnswered(s, answers[s.key]);
                const isCur = i === current;
                const cls =
                  "spine-dot" +
                  (filled ? " filled" : "") +
                  (isCur ? " current" : "");
                return (
                  <button
                    type="button"
                    className={cls}
                    key={i}
                    role="listitem"
                    onClick={() => onJump && onJump(i)}
                    aria-label={s.name + (filled ? " (מולא)" : "")}
                    aria-current={isCur ? "step" : undefined}
                  >
                    <span className="spine-letter">{s.letter}</span>
                  </button>
                );
              })}
            </div>
          );
        }

        function Opening({ name, setName, onStart }) {
          return (
            <div className="screen opening">
              <div className="op-logos">
                <window.NGGLogo height={42} />
              </div>
              <div className="op-eyebrow">{C.opening.eyebrow}</div>
              <h1 className="op-title">{C.opening.title}</h1>
              <p className="op-framing">{C.opening.framing}</p>

              <div className="op-spine">
                {C.steps.map((s, i) => (
                  <span className="op-letter" key={i}>{s.letter}</span>
                ))}
              </div>

              <label className="field">
                <span className="field-label">{C.opening.nameLabel}</span>
                <input
                  className="text-input"
                  type="text"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder={C.opening.namePlaceholder}
                  dir="rtl"
                />
              </label>

              <button className="btn btn-primary btn-block" onClick={onStart}>
                {C.opening.cta}
              </button>
              <div className="op-hint">{C.opening.hint}</div>
            </div>
          );
        }

        function AnswerField({ step, value, onChange }) {
          if (step.type === "text") {
            return (
              <textarea
                className="text-input textarea"
                value={value}
                onChange={(e) => onChange(e.target.value)}
                placeholder={step.placeholder}
                dir="rtl"
                rows={3}
              />
            );
          }

          const multi = step.type === "multi";
          const sel = value.selected;
          const otherOn = multi ? sel.includes(OTHER) : sel === OTHER;

          const toggle = (opt) => {
            if (multi) {
              const set = new Set(sel);
              set.has(opt) ? set.delete(opt) : set.add(opt);
              onChange({ ...value, selected: Array.from(set) });
            } else {
              onChange({ ...value, selected: sel === opt ? "" : opt });
            }
          };

          const isOn = (opt) => (multi ? sel.includes(opt) : sel === opt);

          return (
            <div className="choices">
              {step.options.map((opt, i) => (
                <button
                  type="button"
                  key={i}
                  className={"choice" + (isOn(opt) ? " on" : "")}
                  onClick={() => toggle(opt)}
                >
                  <span className="choice-mark" aria-hidden="true" />
                  <span className="choice-text">{opt}</span>
                </button>
              ))}
              {step.hasOther && (
                <button
                  type="button"
                  className={"choice" + (otherOn ? " on" : "")}
                  onClick={() => toggle(OTHER)}
                >
                  <span className="choice-mark" aria-hidden="true" />
                  <span className="choice-text">{C.nav.otherLabel}</span>
                </button>
              )}
              {otherOn && (
                <input
                  className="text-input other-input"
                  type="text"
                  value={value.other}
                  onChange={(e) => onChange({ ...value, other: e.target.value })}
                  placeholder={C.nav.otherPlaceholder}
                  dir="rtl"
                  autoFocus
                />
              )}
            </div>
          );
        }

        function StepScreen({ step, index, value, onChange, onNext, onBack, answers, onJump }) {
          return (
            <div className="screen step" key={index}>
              <Spine answers={answers} current={index} onJump={onJump} />

              <div className="step-head">
                <span className="step-letter">{step.letter}</span>
                <div className="step-titles">
                  <div className="step-name">{step.name}</div>
                  <div className="step-count">
                    {index + 1} / {C.steps.length}
                  </div>
                </div>
              </div>

              <h2 className="step-question">{step.question}</h2>

              <AnswerField step={step} value={value} onChange={onChange} />

              <div className="op-hint subtle">{C.nav.optional}</div>

              <div className="nav-bar">
                <button className="btn btn-ghost" onClick={onBack}>{C.nav.back}</button>
                <button className="btn btn-primary" onClick={onNext}>
                  {index === C.steps.length - 1 ? C.nav.finish : C.nav.next}
                </button>
              </div>
            </div>
          );
        }

        function MapScreen({ answers, name, onEdit }) {
          const stageRef = useRef(null);
          const [scale, setScale] = useState(1);
          const [busy, setBusy] = useState(false);
          const date = new Date().toLocaleDateString("he-IL");

          const fit = useCallback(() => {
            const stage = stageRef.current;
            if (!stage) return;
            const s = Math.min(1, stage.clientWidth / 794);
            setScale(s);
          }, []);

          useEffect(() => {
            fit();
            window.addEventListener("resize", fit);
            return () => window.removeEventListener("resize", fit);
          }, [fit]);

          const fileBase =
            "MOMENT-מפה-אישית" +
            (name && name.trim() ? "-" + name.trim() : "");

          const capture = async () => {
            const node = document.getElementById("moment-map");
            return await window.html2canvas(node, {
              scale: 2,
              backgroundColor: "#ffffff",
              useCORS: true,
              logging: false,
              width: 794,
              height: 1123,
              windowWidth: 794,
              onclone: (doc) => {
                const sc = doc.querySelector(".map-scaler");
                if (sc) { sc.style.transform = "none"; sc.style.position = "static"; }
                const fr = doc.querySelector(".map-frame");
                if (fr) { fr.style.width = "794px"; fr.style.height = "1123px"; fr.style.overflow = "visible"; }
              },
            });
          };

          const exportPng = async () => {
            setBusy(true);
            try {
              const canvas = await capture();
              const link = document.createElement("a");
              link.download = fileBase + ".png";
              link.href = canvas.toDataURL("image/png");
              link.click();
            } finally { setBusy(false); }
          };

          const exportPdf = async () => {
            setBusy(true);
            try {
              const canvas = await capture();
              const { jsPDF } = window.jspdf;
              const pdf = new jsPDF({ unit: "mm", format: "a4", orientation: "portrait" });
              const img = canvas.toDataURL("image/png");
              pdf.addImage(img, "PNG", 0, 0, 210, 297, undefined, "FAST");
              pdf.save(fileBase + ".pdf");
            } finally { setBusy(false); }
          };

          return (
            <div className="screen map-screen">
              <div className="map-stage" ref={stageRef}>
                <div className="map-frame" style={{ width: 794 * scale, height: 1123 * scale }}>
                  <div className="map-scaler" style={{ transform: `scale(${scale})` }}>
                    <window.MomentMap answers={answers} name={name} date={date} />
                  </div>
                </div>
              </div>

              <div className="export-bar">
                <button className="btn btn-primary btn-block" onClick={exportPdf} disabled={busy}>
                  {busy ? "מכין…" : C.map.exportPdf}
                </button>
                <button className="btn btn-outline btn-block" onClick={exportPng} disabled={busy}>
                  {C.map.exportPng}
                </button>
                <button className="btn btn-ghost btn-block" onClick={onEdit} disabled={busy}>
                  {C.map.editAll}
                </button>
              </div>
            </div>
          );
        }

        function ResetButton({ onReset }) {
          const [confirm, setConfirm] = useState(false);
          if (confirm) return (
            <div className="reset-confirm">
              <span>לאפס הכל?</span>
              <button className="btn btn-ghost reset-yes" onClick={onReset}>כן, אפס</button>
              <button className="btn btn-ghost reset-no" onClick={() => setConfirm(false)}>ביטול</button>
            </div>
          );
          return (
            <button className="btn btn-ghost reset-btn" onClick={() => setConfirm(true)} title="איפוס סשן">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                <path d="M3 3v5h5"/>
              </svg>
              איפוס
            </button>
          );
        }

        function App() {
          const [phase, setPhase] = useState("opening");
          const [stepIndex, setStepIndex] = useState(0);
          const [name, setName] = useState("");
          const [answers, setAnswers] = useState(initAnswers);

          const setAnswer = (key, val) =>
            setAnswers((prev) => ({ ...prev, [key]: val }));

          const reset = () => {
            setPhase("opening");
            setStepIndex(0);
            setName("");
            setAnswers(initAnswers());
          };

          const next = () => {
            if (stepIndex === C.steps.length - 1) setPhase("map");
            else setStepIndex((i) => i + 1);
          };
          const back = () => {
            if (stepIndex === 0) setPhase("opening");
            else setStepIndex((i) => i - 1);
          };
          const jump = (i) => setStepIndex(i);

          let body;
          if (phase === "opening") {
            body = (
              <Opening
                name={name}
                setName={setName}
                onStart={() => { setStepIndex(0); setPhase("steps"); }}
              />
            );
          } else if (phase === "steps") {
            const step = C.steps[stepIndex];
            body = (
              <StepScreen
                step={step}
                index={stepIndex}
                value={answers[step.key]}
                onChange={(v) => setAnswer(step.key, v)}
                onNext={next}
                onBack={back}
                answers={answers}
                onJump={jump}
              />
            );
          } else {
            body = (
              <MapScreen
                answers={answers}
                name={name}
                onEdit={() => { setPhase("steps"); setStepIndex(0); }}
              />
            );
          }

          return (
            <div className={"app phase-" + phase}>
              {body}
              <div className="reset-bar">
                <ResetButton onReset={reset} />
              </div>
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
      })();
    </script>
  </body>
</html>
