<!DOCTYPE html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MOMENT · מפת ההובלה האישית · בנק לאומי</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      /*
        גופן המותג: Fb Typograph / טיפוגרף (Fontbit, גופן מסחרי בליצנזיה).
        לאחר קבלת קבצי הגופן (woff2/woff/ttf), בטלו את ההערה ל-@font-face למטה.
        Assistant משמש כתחליף חופשי קרוב בינתיים.

      @font-face {
        font-family: "Fb Typograph";
        src: url("fonts/FbTypograph-Light.woff2") format("woff2");
        font-weight: 300;
        font-display: swap;
      }
      @font-face {
        font-family: "Fb Typograph";
        src: url("fonts/FbTypograph-Regular.woff2") format("woff2");
        font-weight: 400;
        font-display: swap;
      }
      @font-face {
        font-family: "Fb Typograph";
        src: url("fonts/FbTypograph-Bold.woff2") format("woff2");
        font-weight: 600;
        font-display: swap;
      }
      @font-face {
        font-family: "Fb Typograph";
        src: url("fonts/FbTypograph-Black.woff2") format("woff2");
        font-weight: 800;
        font-display: swap;
      }
      */

      :root {
        --bg: #fbfaf8;
        --ink: #1c1c24;
        --wine: #7a1f2b;
        --wine-soft: #7a1f2b22;
        --gold: #c8a04e;
        --gold-ink: #8a6a28;
        --surface: #ffffff;
        --border: #e7e3dc;
        --muted: #6f6b63;
        --muted-2: #9a958c;
        --radius: 18px;
        --shadow: 0 1px 2px rgba(28, 28, 36, 0.04),
          0 12px 40px -16px rgba(28, 28, 36, 0.12);
        --ease: cubic-bezier(0.22, 0.61, 0.36, 1);
        --font-main: "Fb Typograph", "Assistant", "Heebo", system-ui, sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--ink);
        font-family: var(--font-main);
        font-weight: 400;
        -webkit-font-smoothing: antialiased;
        line-height: 1.5;
      }

      #root {
        min-height: 100vh;
        min-height: 100dvh;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: clamp(0px, 4vw, 40px);
      }

      .app {
        width: 100%;
        max-width: 560px;
        margin: auto;
      }

      /* ---------- screen card ---------- */
      .screen {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: clamp(24px, 6vw, 40px);
      }
      .map-screen {
        background: transparent;
        border: none;
        box-shadow: none;
        padding: 0;
      }

      /* ---------- buttons ---------- */
      .btn {
        font-family: inherit;
        font-size: 17px;
        font-weight: 600;
        border-radius: 12px;
        padding: 14px 26px;
        min-height: 52px;
        border: 1px solid transparent;
        cursor: pointer;
        transition: transform 0.12s var(--ease), background 0.18s,
          box-shadow 0.18s, border-color 0.18s;
      }
      .btn:active {
        transform: translateY(1px) scale(0.995);
      }
      .btn:disabled {
        opacity: 0.55;
        cursor: default;
      }
      .btn-primary {
        background: var(--wine);
        color: #fff;
      }
      .btn-primary:hover:not(:disabled) {
        background: #6a1a25;
        box-shadow: 0 8px 22px -10px var(--wine);
      }
      .btn-outline {
        background: #fff;
        border-color: var(--wine);
        color: var(--wine);
      }
      .btn-outline:hover:not(:disabled) {
        background: #fdf6f2;
      }
      .btn-ghost {
        background: transparent;
        color: var(--muted);
      }
      .btn-ghost:hover:not(:disabled) {
        color: var(--ink);
      }
      .btn-block {
        display: block;
        width: 100%;
      }

      /* ---------- inputs ---------- */
      .field {
        display: block;
        margin: 28px 0 20px;
      }
      .field-label {
        display: block;
        font-size: 15px;
        font-weight: 600;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .text-input {
        width: 100%;
        font-family: inherit;
        font-size: 17px;
        color: var(--ink);
        background: #fdfdfc;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 14px 16px;
        transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
      }
      .text-input::placeholder {
        color: var(--muted-2);
      }
      .text-input:focus {
        outline: none;
        background: #fff;
        border-color: var(--wine);
        box-shadow: 0 0 0 3px var(--wine-soft);
      }
      .textarea {
        resize: vertical;
        min-height: 96px;
        line-height: 1.5;
      }
      .other-input {
        margin-top: 4px;
      }

      /* ---------- opening screen ---------- */
      .op-eyebrow {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: var(--gold-ink);
        margin-bottom: 14px;
      }
      .op-title {
        font-size: clamp(24px, 6.5vw, 30px);
        font-weight: 800;
        line-height: 1.25;
        margin: 0 0 14px;
        text-wrap: balance;
      }
      .op-framing {
        font-size: 17px;
        color: var(--muted);
        margin: 0 0 26px;
        text-wrap: pretty;
      }
      .op-spine {
        display: flex;
        direction: ltr;
        gap: clamp(6px, 2.5vw, 14px);
        justify-content: center;
        padding: 22px 0 6px;
        border-top: 1px solid var(--border);
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
      }
      .op-letter {
        font-size: clamp(22px, 7vw, 34px);
        font-weight: 800;
        color: var(--border);
        line-height: 1;
        transition: color 0.3s;
      }
      .op-letter:nth-child(odd) {
        color: #ddd6cb;
      }
      .op-hint {
        font-size: 13px;
        color: var(--muted-2);
        text-align: center;
        margin-top: 14px;
      }
      .op-hint.subtle {
        text-align: right;
        margin: 14px 0 0;
      }

      /* ---------- spine (progress / filling map) ---------- */
      .spine {
        display: flex;
        direction: ltr;
        gap: 10px;
        justify-content: space-between;
        margin-bottom: 30px;
      }
      .spine-dot {
        flex: 1;
        aspect-ratio: 1;
        max-width: 52px;
        border-radius: 50%;
        border: 1.5px solid var(--border);
        background: #fff;
        color: var(--muted-2);
        font-family: inherit;
        cursor: pointer;
        display: grid;
        place-items: center;
        padding: 0;
        transition: all 0.35s var(--ease);
      }
      .spine-letter {
        font-size: 18px;
        font-weight: 800;
        line-height: 1;
      }
      .spine-dot.filled {
        background: var(--wine);
        border-color: var(--wine);
        color: #fff;
        box-shadow: 0 0 0 3px var(--gold);
      }
      .spine-dot.current {
        border-color: var(--wine);
        color: var(--wine);
        transform: scale(1.08);
      }
      .spine-dot.current.filled {
        color: #fff;
      }

      /* ---------- step screen ---------- */
      .step-head {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 18px;
      }
      .step-letter {
        font-size: clamp(48px, 16vw, 68px);
        font-weight: 800;
        color: var(--wine);
        line-height: 0.85;
      }
      .step-titles {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .step-name {
        font-size: 20px;
        font-weight: 600;
      }
      .step-count {
        font-size: 13px;
        color: var(--muted-2);
        font-weight: 600;
        letter-spacing: 0.05em;
        direction: ltr;
        text-align: right;
      }
      .step-question {
        font-size: clamp(19px, 4.8vw, 22px);
        font-weight: 400;
        line-height: 1.4;
        margin: 0 0 22px;
        text-wrap: pretty;
      }

      /* ---------- choices ---------- */
      .choices {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .choice {
        display: flex;
        align-items: center;
        gap: 14px;
        text-align: right;
        font-family: inherit;
        font-size: 17px;
        color: var(--ink);
        background: #fdfdfc;
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 0 18px;
        min-height: 56px;
        cursor: pointer;
        transition: border-color 0.16s, background 0.16s, box-shadow 0.16s;
      }
      .choice:hover {
        border-color: var(--gold);
      }
      .choice-mark {
        flex: none;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        border: 2px solid var(--border);
        transition: all 0.16s var(--ease);
        position: relative;
      }
      .choice.on {
        border-color: var(--wine);
        background: #fdf6f2;
        box-shadow: inset 0 0 0 1px var(--wine);
      }
      .choice.on .choice-mark {
        border-color: var(--wine);
        background: var(--wine);
      }
      .choice.on .choice-mark::after {
        content: "";
        position: absolute;
        inset: 0;
        margin: auto;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--gold);
      }
      .choice-text {
        flex: 1;
      }

      /* ---------- nav bar ---------- */
      .nav-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-top: 28px;
        padding-top: 22px;
        border-top: 1px solid var(--border);
      }

      /* ---------- map screen ---------- */
      .map-stage {
        width: 100%;
        display: flex;
        justify-content: center;
      }
      .map-frame {
        position: relative;
        overflow: hidden;
      }
      .map-scaler {
        position: absolute;
        top: 0;
        left: 0;
        width: 794px;
        transform-origin: top left;
      }
      .export-bar {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-width: 560px;
        margin: 22px auto 0;
      }

      /* =========================================================
         A4 MAP — התוצר המיוצא (794 × 1123 @96dpi)
         ========================================================= */
      .a4 {
        width: 794px;
        height: 1123px;
        background: #fff;
        color: var(--ink);
        position: relative;
        box-shadow: 0 20px 60px -24px rgba(28, 28, 36, 0.28);
      }
      .a4-inner {
        position: absolute;
        inset: 0;
        padding: 60px 64px 52px;
        display: flex;
        flex-direction: column;
      }

      .map-head {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 24px;
      }
      .map-title {
        font-size: 40px;
        font-weight: 800;
        color: var(--wine);
        margin: 0 0 8px;
        line-height: 1;
        white-space: nowrap;
      }
      .map-meta {
        font-size: 16px;
        color: var(--muted);
        font-weight: 400;
      }
      .map-logo {
        flex: none;
        width: 148px;
        height: 60px;
        border: 1.5px dashed var(--border);
        border-radius: 8px;
        display: grid;
        place-items: center;
        color: var(--muted-2);
        font-size: 13px;
        font-weight: 600;
        background: #fcfbf9;
      }

      .map-rule {
        height: 3px;
        background: linear-gradient(
          90deg,
          var(--gold),
          var(--gold) 60%,
          transparent
        );
        margin: 26px 0 6px;
        border-radius: 2px;
      }
      .map-rule.soft {
        height: 1px;
        background: var(--border);
        margin: 0 0 22px;
      }

      .map-body {
        position: relative;
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-evenly;
        padding: 18px 0;
      }
      .spine-line {
        position: absolute;
        top: 34px;
        bottom: 34px;
        right: 27px;
        width: 2px;
        background: var(--wine);
        opacity: 0.85;
      }

      .milestone {
        display: flex;
        align-items: flex-start;
        gap: 22px;
        opacity: 0.5;
        transition: opacity 0.4s var(--ease);
      }
      .milestone.is-filled {
        opacity: 1;
      }
      .ms-node {
        flex: none;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid var(--wine);
        color: var(--wine);
        display: grid;
        place-items: center;
        position: relative;
        z-index: 1;
        transition: all 0.4s var(--ease);
      }
      .milestone.is-filled .ms-node {
        background: var(--wine);
        color: #fff;
        border-color: var(--wine);
        box-shadow: 0 0 0 4px var(--gold);
      }
      .ms-letter {
        font-size: 28px;
        font-weight: 800;
        line-height: 1;
      }
      .ms-content {
        padding-top: 4px;
        flex: 1;
        min-width: 0;
      }
      .ms-name {
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.06em;
        color: var(--gold-ink);
        margin-bottom: 3px;
      }
      .ms-answer {
        font-size: 19px;
        line-height: 1.4;
      }
      .ms-label {
        font-weight: 600;
        color: var(--wine);
      }
      .ms-value {
        font-weight: 400;
        color: var(--ink);
      }
      .ms-empty {
        color: var(--muted-2);
      }

      .map-foot {
        margin-top: 12px;
      }
      .map-closing {
        text-align: center;
        font-size: 22px;
        font-weight: 600;
        color: var(--wine);
      }
      .map-closing::before,
      .map-closing::after {
        content: "·";
        color: var(--gold);
        margin: 0 12px;
        font-weight: 800;
      }

      @media (max-width: 420px) {
        .screen {
          border-radius: 14px;
        }
        .spine {
          gap: 6px;
        }
      }
    </style>
  </head>

    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"

    ></script>
    <script

    ></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- ── CONTENT: כל הטקסטים ──────────────────────────────────────── -->
    <script type="text/babel">
      window.MOMENT_CONTENT = {
        brand: {

        opening: {

          framing:
            "זו המפה האישית שלך להובלת התהליך. ענו על כל מרכיב, ובסוף תקבלו אותה לקחת איתכם.",
          nameLabel: "השם שלי (יופיע על המפה)",

        steps: [
          {

          exportPng: "שמירה כתמונה (PNG)",

        },

    <!-- ── MAP COMPONENT: מפת ההובלה A4 ────────────────────────────── -->
    <script type="text/babel">
      (function () {
        const C = window.MOMENT_CONTENT;

        function resolveAnswer(step, answers) {
          const v = answers[step.key];
          if (!v) return "";
          if (step.type === "text") return (v || "").trim();
          if (step.type === "multi") {
            const arr = v.selected || [];
            const parts = arr
              .map((o) => (o === "__other__" ? (v.other || "").trim() : o))
              .filter(Boolean);
            return parts.join("  ·  ");
          }
          if (v.selected) {
            return v.selected === "__other__"
              ? (v.other || "").trim()
              : v.selected;
          }
          return "";
        }
        window.resolveAnswer = resolveAnswer;

        function MomentMap({ answers, name, date }) {
          const meta = [C.brand.service, name && name.trim(), date]
            .filter(Boolean)
            .join("   ·   ");

          return (
            <div className="a4" id="moment-map" dir="rtl">
              <div className="a4-inner">
                <header className="map-head">
                  <div className="map-head-text">
                    <h1 className="map-title">{C.map.title}</h1>
                    <div className="map-meta">{meta}</div>
                  </div>
                  <div
                    className="map-logo"
                    aria-label={C.map.logoPlaceholder}
                  >
                    <span>{C.map.logoPlaceholder}</span>
                  </div>
                </header>

                <div className="map-rule" />

                <div className="map-body">
                  <div className="spine-line" />
                  {C.steps.map((step, i) => {
                    const ans = resolveAnswer(step, answers);
                    const filled = !!ans;
                    return (
                      <div
                        className={"milestone" + (filled ? " is-filled" : "")}
                        key={i}
                      >
                        <div className="ms-node">
                          <span className="ms-letter">{step.letter}</span>
                        </div>
                        <div className="ms-content">
                          <div className="ms-name">{step.name}</div>
                          <div className="ms-answer">
                            <span className="ms-label">{step.mapLabel}:</span>{" "}
                            {filled ? (
                              <span className="ms-value">{ans}</span>
                            ) : (
                              <span className="ms-empty">
                                {C.map.emptyValue}
                              </span>
                            )}
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>

                <footer className="map-foot">
                  <div className="map-rule soft" />
                  <div className="map-closing">{C.map.closing}</div>
                </footer>
              </div>
            </div>
          );
        }

        window.MomentMap = MomentMap;
      })();
    </script>

    <!-- ── APP: פתיחה → 6 שלבים → מפה → ייצוא ──────────────────────── -->
    <script type="text/babel">
      (function () {
        const { useState, useRef, useEffect, useCallback } = React;
        const C = window.MOMENT_CONTENT;
        const OTHER = "__other__";

        function initAnswers() {
          const a = {};
          C.steps.forEach((s) => {
            if (s.type === "text") a[s.key] = "";
            else if (s.type === "multi") a[s.key] = { selected: [], other: "" };
            else a[s.key] = { selected: "", other: "" };
          });
          return a;
        }

        function isAnswered(step, v) {
          if (!v) return false;
          if (step.type === "text") return !!v.trim();
          if (step.type === "multi")
            return (
              v.selected.length > 0 &&
              !(
                v.selected.length === 1 &&
                v.selected[0] === OTHER &&
                !v.other.trim()
              )
            );
          return v.selected && !(v.selected === OTHER && !v.other.trim());
        }

        /* ---------- שדרת האותיות ---------- */
        function Spine({ answers, current, onJump }) {
          return (
            <div className="spine" role="list" aria-label="התקדמות במפה">
              {C.steps.map((s, i) => {
                const filled = isAnswered(s, answers[s.key]);
                const isCur = i === current;
                const cls =
                  "spine-dot" +
                  (filled ? " filled" : "") +
                  (isCur ? " current" : "");
                return (
                  <button
                    type="button"
                    className={cls}
                    key={i}
                    role="listitem"
                    onClick={() => onJump && onJump(i)}
                    aria-label={s.name + (filled ? " (מולא)" : "")}
                    aria-current={isCur ? "step" : undefined}
                  >
                    <span className="spine-letter">{s.letter}</span>
                  </button>
                );
              })}
            </div>
          );
        }

        /* ---------- מסך פתיחה ---------- */
        function Opening({ name, setName, onStart }) {
          return (
            <div className="screen opening">
              <div className="op-eyebrow">{C.opening.eyebrow}</div>
              <h1 className="op-title">{C.opening.title}</h1>
              <p className="op-framing">{C.opening.framing}</p>

              <div className="op-spine">
                {C.steps.map((s, i) => (
                  <span className="op-letter" key={i}>
                    {s.letter}
                  </span>
                ))}
              </div>

              <label className="field">
                <span className="field-label">{C.opening.nameLabel}</span>
                <input
                  className="text-input"
                  type="text"
                  value={name}
                  onChange={(e) => setName(e.target.value)}
                  placeholder={C.opening.namePlaceholder}
                  dir="rtl"
                />
              </label>

              <button
                className="btn btn-primary btn-block"
                onClick={onStart}
              >
                {C.opening.cta}
              </button>
              <div className="op-hint">{C.opening.hint}</div>
            </div>
          );
        }

        /* ---------- מענה: טקסט / יחיד / מרובה ---------- */
        function AnswerField({ step, value, onChange }) {
          if (step.type === "text") {
            return (
              <textarea
                className="text-input textarea"
                value={value}
                onChange={(e) => onChange(e.target.value)}
                placeholder={step.placeholder}
                dir="rtl"
                rows={3}
              />
            );
          }

          const multi = step.type === "multi";
          const sel = value.selected;
          const otherOn = multi ? sel.includes(OTHER) : sel === OTHER;

          const toggle = (opt) => {
            if (multi) {
              const set = new Set(sel);
              set.has(opt) ? set.delete(opt) : set.add(opt);
              onChange({ ...value, selected: Array.from(set) });
            } else {
              onChange({ ...value, selected: sel === opt ? "" : opt });
            }
          };

          const isOn = (opt) => (multi ? sel.includes(opt) : sel === opt);

          return (
            <div className="choices">
              {step.options.map((opt, i) => (
                <button
                  type="button"
                  key={i}
                  className={"choice" + (isOn(opt) ? " on" : "")}
                  onClick={() => toggle(opt)}
                >
                  <span className="choice-mark" aria-hidden="true" />
                  <span className="choice-text">{opt}</span>
                </button>
              ))}
              {step.hasOther && (
                <button
                  type="button"
                  className={"choice" + (otherOn ? " on" : "")}
                  onClick={() => toggle(OTHER)}
                >
                  <span className="choice-mark" aria-hidden="true" />
                  <span className="choice-text">{C.nav.otherLabel}</span>
                </button>
              )}
              {otherOn && (
                <input
                  className="text-input other-input"
                  type="text"
                  value={value.other}
                  onChange={(e) =>
                    onChange({ ...value, other: e.target.value })
                  }
                  placeholder={C.nav.otherPlaceholder}
                  dir="rtl"
                  autoFocus
                />
              )}
            </div>
          );
        }

        /* ---------- מסך שלב ---------- */
        function StepScreen({
          step,
          index,
          value,
          onChange,
          onNext,
          onBack,
          answers,
          onJump,
        }) {
          return (
            <div className="screen step" key={index}>
              <Spine answers={answers} current={index} onJump={onJump} />

              <div className="step-head">
                <span className="step-letter">{step.letter}</span>
                <div className="step-titles">
                  <div className="step-name">{step.name}</div>
                  <div className="step-count">
                    {index + 1} / {C.steps.length}
                  </div>
                </div>
              </div>

              <h2 className="step-question">{step.question}</h2>

              <AnswerField step={step} value={value} onChange={onChange} />

              <div className="op-hint subtle">{C.nav.optional}</div>

              <div className="nav-bar">
                <button className="btn btn-ghost" onClick={onBack}>
                  {C.nav.back}
                </button>
                <button className="btn btn-primary" onClick={onNext}>
                  {index === C.steps.length - 1
                    ? C.nav.finish
                    : C.nav.next}
                </button>
              </div>
            </div>
          );
        }

        /* ---------- מסך המפה + ייצוא ---------- */
        function MapScreen({ answers, name, onEdit }) {
          const stageRef = useRef(null);
          const [scale, setScale] = useState(1);
          const [busy, setBusy] = useState(false);
          const date = new Date().toLocaleDateString("he-IL");

          const fit = useCallback(() => {
            const stage = stageRef.current;
            if (!stage) return;
            const s = Math.min(1, stage.clientWidth / 794);
            setScale(s);
          }, []);

          useEffect(() => {
            fit();
            window.addEventListener("resize", fit);
            return () => window.removeEventListener("resize", fit);
          }, [fit]);

          const fileBase =
            "MOMENT-מפה-אישית" +
            (name && name.trim() ? "-" + name.trim() : "");

          const capture = async () => {
            const node = document.getElementById("moment-map");
            return await window.html2canvas(node, {
              scale: 2,
              backgroundColor: "#ffffff",
              useCORS: true,
              logging: false,
              width: 794,
              height: 1123,
              windowWidth: 794,
              onclone: (doc) => {
                const sc = doc.querySelector(".map-scaler");
                if (sc) {
                  sc.style.transform = "none";
                  sc.style.position = "static";
                }
                const fr = doc.querySelector(".map-frame");
                if (fr) {
                  fr.style.width = "794px";
                  fr.style.height = "1123px";
                  fr.style.overflow = "visible";
                }
              },
            });
          };

          const exportPng = async () => {
            setBusy(true);
            try {
              const canvas = await capture();
              const link = document.createElement("a");
              link.download = fileBase + ".png";
              link.href = canvas.toDataURL("image/png");
              link.click();
            } finally {
              setBusy(false);
            }
          };

          const exportPdf = async () => {
            setBusy(true);
            try {
              const canvas = await capture();
              const { jsPDF } = window.jspdf;
              const pdf = new jsPDF({
                unit: "mm",
                format: "a4",
                orientation: "portrait",
              });
              const img = canvas.toDataURL("image/png");
              pdf.addImage(img, "PNG", 0, 0, 210, 297, undefined, "FAST");
              pdf.save(fileBase + ".pdf");
            } finally {
              setBusy(false);
            }
          };

          return (
            <div className="screen map-screen">
              <div className="map-stage" ref={stageRef}>
                <div
                  className="map-frame"
                  style={{ width: 794 * scale, height: 1123 * scale }}
                >
                  <div
                    className="map-scaler"
                    style={{ transform: `scale(${scale})` }}
                  >
                    <window.MomentMap
                      answers={answers}
                      name={name}
                      date={date}
                    />
                  </div>
                </div>
              </div>

              <div className="export-bar">
                <button
                  className="btn btn-primary btn-block"
                  onClick={exportPdf}
                  disabled={busy}
                >
                  {busy ? "מכין…" : C.map.exportPdf}
                </button>
                <button
                  className="btn btn-outline btn-block"
                  onClick={exportPng}
                  disabled={busy}
                >
                  {C.map.exportPng}
                </button>
                <button
                  className="btn btn-ghost btn-block"
                  onClick={onEdit}
                  disabled={busy}
                >
                  {C.map.editAll}
                </button>
              </div>
            </div>
          );
        }

        /* ---------- App ---------- */
        function App() {
          const [phase, setPhase] = useState("opening");
          const [stepIndex, setStepIndex] = useState(0);
          const [name, setName] = useState("");
          const [answers, setAnswers] = useState(initAnswers);

          const setAnswer = (key, val) =>
            setAnswers((prev) => ({ ...prev, [key]: val }));

          const next = () => {
            if (stepIndex === C.steps.length - 1) setPhase("map");
            else setStepIndex((i) => i + 1);
          };
          const back = () => {
            if (stepIndex === 0) setPhase("opening");
            else setStepIndex((i) => i - 1);
          };
          const jump = (i) => setStepIndex(i);

          let body;
          if (phase === "opening") {
            body = (
              <Opening
                name={name}
                setName={setName}
                onStart={() => {
                  setStepIndex(0);
                  setPhase("steps");
                }}
              />
            );
          } else if (phase === "steps") {
            const step = C.steps[stepIndex];
            body = (
              <StepScreen
                step={step}
                index={stepIndex}
                value={answers[step.key]}
                onChange={(v) => setAnswer(step.key, v)}
                onNext={next}
                onBack={back}
                answers={answers}
                onJump={jump}
              />
            );
          } else {
            body = (
              <MapScreen
                answers={answers}
                name={name}
                onEdit={() => {
                  setPhase("steps");
                  setStepIndex(0);
                }}
              />
            );
          }

          return <div className={"app phase-" + phase}>{body}</div>;
        }

        ReactDOM.createRoot(document.getElementById("root")).render(<App />);
      })();
    </script>
  </body>
</html>
